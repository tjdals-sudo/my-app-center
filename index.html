<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트웨어 다운로드 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 부드러운 스크롤 및 전환 효과를 위한 커스텀 스타일 */
        html { scroll-behavior: smooth; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- 내비게이션 바 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="download-cloud" class="w-8 h-8 text-blue-600"></i>
                    <span class="font-bold text-xl tracking-tight text-gray-900">AppCenter</span>
                </div>
                <div class="hidden sm:flex space-x-8">
                    <a href="#" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">Windows</a>
                    <a href="#" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">macOS</a>
                    <a href="#" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">Linux</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 헤더 섹션 -->
    <header class="bg-blue-600 py-16 sm:py-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl font-extrabold text-white sm:text-5xl sm:tracking-tight lg:text-6xl">
                필요한 소프트웨어를 한 곳에서
            </h1>
            <p class="mt-5 max-w-xl mx-auto text-xl text-blue-100">
                최신 버전의 설치 파일을 안전하고 빠르게 다운로드하세요. 아래에서 원하는 운영체제에 맞는 파일을 선택할 수 있습니다.
            </p>
            
            <!-- 검색 바 -->
            <div class="mt-8 max-w-lg mx-auto relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i data-lucide="search" class="h-5 w-5 text-gray-400"></i>
                </div>
                <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-3 border border-transparent rounded-full leading-5 bg-white shadow-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition-all" placeholder="프로그램 이름 검색...">
            </div>
        </div>
    </header>

    <!-- 파일 목록 섹션 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8 flex justify-between items-end border-b pb-4">
            <h2 class="text-2xl font-bold text-gray-900">최신 설치 파일</h2>
            <span class="text-sm text-gray-500">총 <span id="fileCount" class="font-bold text-blue-600">0</span>개의 파일</span>
        </div>

        <!-- 파일 카드 그리드 컨테이너 -->
        <div id="fileGrid" class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- JavaScript를 통해 이 곳에 파일 카드들이 렌더링됩니다. -->
        </div>

        <!-- 검색 결과가 없을 때 보여줄 메시지 -->
        <div id="noResults" class="hidden text-center py-12">
            <i data-lucide="file-question" class="mx-auto h-12 w-12 text-gray-400 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900">검색 결과가 없습니다.</h3>
            <p class="text-gray-500">다른 검색어로 다시 시도해 보세요.</p>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="bg-white border-t mt-12 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            &copy; 2026 AppCenter. All rights reserved.
        </div>
    </footer>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 💡 [중요] 여기에 사용자의 파일 정보를 입력합니다.
        // url 부분에 구글드라이브 등에서 얻은 실제 다운로드 링크를 넣으시면 됩니다.
        const filesData = [
            {
                id: 1,
                name: "업무 자동화 툴 (Pro)",
                version: "v2.1.4",
                os: "Windows",
                size: "125 MB",
                date: "2026-04-10",
                description: "반복적인 업무를 클릭 한 번으로 해결해주는 강력한 자동화 소프트웨어입니다.",
                icon: "monitor", // lucide 아이콘 이름
                url: "#설치파일링크_여기에_입력" 
            },
            {
                id: 2,
                name: "업무 자동화 툴 (Pro)",
                version: "v2.1.4",
                os: "macOS",
                size: "110 MB",
                date: "2026-04-10",
                description: "애플 실리콘(M1/M2/M3)에 최적화된 업무 자동화 소프트웨어입니다.",
                icon: "apple",
                url: "#설치파일링크_여기에_입력"
            },
            {
                id: 3,
                name: "디자인 리소스 매니저",
                version: "v1.0.0",
                os: "Windows",
                size: "85 MB",
                date: "2026-04-05",
                description: "수많은 디자인 파일과 에셋을 태그 기반으로 손쉽게 관리하세요.",
                icon: "layout-template",
                url: "#설치파일링크_여기에_입력"
            },
            {
                id: 4,
                name: "시스템 최적화 클리너",
                version: "v3.5.2",
                os: "Linux",
                size: "45 MB",
                date: "2026-03-28",
                description: "불필요한 캐시 파일과 로그를 정리하여 시스템 속도를 향상시킵니다.",
                icon: "cpu",
                url: "#https://drive.google.com/drive/folders/18cYE02pekJ4jA3uUwMOnxS-prZRnLKlj?usp=sharing"
            }
        ];

        const fileGrid = document.getElementById('fileGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const fileCountSpan = document.getElementById('fileCount');

        // 운영체제별 색상 뱃지 반환 함수
        function getOsBadgeColor(os) {
            switch(os.toLowerCase()) {
                case 'windows': return 'bg-blue-100 text-blue-800';
                case 'macos': return 'bg-gray-100 text-gray-800';
                case 'linux': return 'bg-yellow-100 text-yellow-800';
                default: return 'bg-green-100 text-green-800';
            }
        }

        // 파일 카드 렌더링 함수
        function renderFiles(files) {
            fileGrid.innerHTML = ''; // 기존 내용 지우기
            fileCountSpan.textContent = files.length;

            if (files.length === 0) {
                fileGrid.classList.add('hidden');
                noResults.classList.remove('hidden');
                return;
            }

            fileGrid.classList.remove('hidden');
            noResults.classList.add('hidden');

            files.forEach(file => {
                const osBadgeClass = getOsBadgeColor(file.os);
                
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col h-full card-hover';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-blue-50 p-3 rounded-lg text-blue-600">
                            <i data-lucide="${file.icon}" class="w-6 h-6"></i>
                        </div>
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${osBadgeClass}">
                            ${file.os}
                        </span>
                    </div>
                    
                    <div class="flex-grow">
                        <h3 class="text-lg font-bold text-gray-900 line-clamp-1">${file.name}</h3>
                        <div class="flex items-center gap-2 mt-1 text-sm text-gray-500">
                            <span class="font-medium bg-gray-100 px-2 py-0.5 rounded text-xs">${file.version}</span>
                            <span>•</span>
                            <span>${file.size}</span>
                        </div>
                        <p class="mt-3 text-sm text-gray-600 line-clamp-2">
                            ${file.description}
                        </p>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                        <span class="text-xs text-gray-400">업데이트: ${file.date}</span>
                        <a href="${file.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            <i data-lucide="download" class="w-4 h-4 mr-2"></i>
                            다운로드
                        </a>
                    </div>
                `;
                fileGrid.appendChild(card);
            });

            // 동적으로 생성된 요소의 아이콘 다시 렌더링
            lucide.createIcons();
        }

        // 초기 렌더링
        renderFiles(filesData);

        // 검색 기능 구현
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredFiles = filesData.filter(file => 
                file.name.toLowerCase().includes(searchTerm) || 
                file.description.toLowerCase().includes(searchTerm) ||
                file.os.toLowerCase().includes(searchTerm)
            );
            renderFiles(filteredFiles);
        });
    </script>
</body>
</html>
